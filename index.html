<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Il Vecchio AR</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #FAF9F6; display: flex; justify-content: center; }
        
        /* Esta caja envuelve todo y asegura que nada se mueva */
        .contenedor-fijo { 
            position: relative; 
            width: 100%; 
            max-width: 1080px; 
        }

        .menu-img { 
            width: 100%; 
            height: auto; 
            display: block; 
        }

        /* Los botones ahora se posicionan RELATIVOS a la imagen, no a la pantalla */
        .btn-invisible {
            position: absolute;
            width: 8%;  /* Ancho relativo a la imagen */
            height: 2%; /* Alto relativo a la imagen */
            background: rgba(255, 0, 0, 0); /* Cambia a 0.3 para verlos y ajustar */
            cursor: pointer;
            z-index: 10;
        }

        /* Coordenadas exactas basadas en tu diseño de 1080x2890 */
        #ar1 { top: 6.7%; left: 42.5%; }
        #ar2 { top: 7.7%; left: 42.5%; }
        #ar3 { top: 8.7%; left: 42.5%; }
        #ar4 { top: 25.1%; left: 42.5%; }

        model-viewer { display: none; }
    </style>
</head>
<body>

<div class="contenedor-fijo">
    <img src="menu_completo_ar.jpg" class="menu-img">
    
    <div id="ar1" class="btn-invisible" onclick="lanzarAR('plato1')"></div>
    <div id="ar2" class="btn-invisible" onclick="lanzarAR('plato2')"></div>
    <div id="ar3" class="btn-invisible" onclick="lanzarAR('plato3')"></div>
    <div id="ar4" class="btn-invisible" onclick="lanzarAR('plato4')"></div>
</div>

<model-viewer id="visor" ar ar-modes="quick-look scene-viewer"></model-viewer>

<script>
    function lanzarAR(m) {
        const v = document.getElementById('visor');
        v.src = m + '.glb';
        v.iosSrc = m + '.usdz';
        v.activateAR();
    }
</script>

</body>
</html>
