<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Il Vecchio AR</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; background: #FAF9F6; font-family: sans-serif; }
        .menu-container { width: 100%; display: flex; flex-direction: column; align-items: center; }
        img { width: 100%; max-width: 1080px; height: auto; display: block; }

        /* Estilo de los botones sobre las cámaras */
        .btn-ar {
            position: absolute;
            width: 50px; /* Tamaño del área de toque */
            height: 50px;
            background: rgba(255, 0, 0, 0); /* Totalmente invisible */
            cursor: pointer;
            z-index: 1000;
            -webkit-tap-highlight-color: rgba(139, 69, 19, 0.4);
        }

        /* Posicionamiento exacto por porcentaje (%) 
           Esto hace que NO se mueva sin importar el móvil */
        #btn1 { top: 6.8%; left: 42%; }  /* Gambero Rosso */
        #btn2 { top: 7.8%; left: 42%; }  /* Tartar */
        #btn3 { top: 8.8%; left: 42%; }  /* Mejillones */
        #btn4 { top: 25.1%; left: 42%; } /* Gran Lubina */

        model-viewer { display: none; }
    </style>
</head>
<body>

<div class="menu-container" id="contenedor">
    <img src="menu_completo_ar.jpg">
    
    <div id="btn1" class="btn-ar" onclick="lanzarAR('plato1')"></div>
    <div id="btn2" class="btn-ar" onclick="lanzarAR('plato2')"></div>
    <div id="btn3" class="btn-ar" onclick="lanzarAR('plato3')"></div>
    <div id="btn4" class="btn-ar" onclick="lanzarAR('plato4')"></div>
</div>

<model-viewer id="visor" ar ar-modes="quick-look scene-viewer"></model-viewer>

<script>
    function lanzarAR(m) {
        const v = document.getElementById('visor');
        v.src = m + '.glb';
        v.iosSrc = m + '.usdz';
        setTimeout(() => { v.activateAR(); }, 50);
    }
</script>

</body>
</html>
