<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Il Vecchio – Menú</title>

  <!-- Model Viewer (necesario para Android/GLB) -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    /* ── Contenedor principal de la imagen ── */
    .menu-wrapper {
      position: relative;
      width: 100%;
      max-width: 600px;
    }

    .menu-wrapper img {
      width: 100%;
      height: auto;
      display: block;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── Botones AR invisibles sobre cada icono 📷 ──
       Posicionados en % para que escalen con la imagen
       en cualquier tamaño de pantalla.
       Para depurar, añade: background: rgba(255,0,0,0.4);
    ── */
    .ar-btn {
      position: absolute;
      width: 6%;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      cursor: pointer;
      background: transparent;
      border: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .ar-btn:active {
      background: rgba(255, 255, 255, 0.12);
    }

    /* ── Posiciones de cada icono 📷 sobre el menú ──
       left = posición horizontal (% del ancho de la imagen)
       top  = posición vertical   (% del alto de la imagen)
       Imagen original: 1080 × 2890 px
    ── */
    #ar-1 { left: 44.2%; top: 10.8%; }   /* CAMBERO ROSSO         */
    #ar-2 { left: 44.2%; top: 13.0%; }   /* TARTAR DEL VECCHIO    */
    #ar-3 { left: 44.2%; top: 15.3%; }   /* MEJILLONES CACIO&PEPE */
    #ar-4 { left: 44.2%; top: 54.0%; }   /* GRAN LUBINA AQUANARIA */

    /* ── Overlay para Android (model-viewer flotante) ── */
    #ar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.93);
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #ar-overlay.visible {
      display: flex;
    }

    #ar-overlay model-viewer {
      width: 90vw;
      height: 70vh;
      background: transparent;
    }

    #btn-cerrar {
      position: absolute;
      top: 20px;
      right: 20px;
      background: #fff;
      color: #111;
      border: none;
      border-radius: 24px;
      padding: 10px 22px;
      font-size: 15px;
      font-family: Georgia, serif;
      letter-spacing: 0.03em;
      cursor: pointer;
      z-index: 1001;
    }

    #nombre-plato {
      position: absolute;
      bottom: 30px;
      color: #fff;
      font-family: Georgia, serif;
      font-size: 16px;
      letter-spacing: 0.06em;
      opacity: 0.75;
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════
     MENÚ + BOTONES AR
═══════════════════════════════════════════════ -->
<div class="menu-wrapper">

  <!-- Cambia esta ruta si la imagen está en otra carpeta -->
  <img src="menu_completo_ar.jpg" alt="Menú Il Vecchio" draggable="false">

  <!-- 1 · CAMBERO ROSSO -->
  <button class="ar-btn" id="ar-1"
    data-usdz="plato7.usdz"
    data-glb="plato7.glb"
    data-nombre="Cambero Rosso"
    aria-label="Ver Cambero Rosso en AR">
  </button>

  <!-- 2 · TARTAR DEL VECCHIO -->
  <button class="ar-btn" id="ar-2"
    data-usdz="plato2.usdz"
    data-glb="plato2.glb"
    data-nombre="Tartar del Vecchio"
    aria-label="Ver Tartar del Vecchio en AR">
  </button>

  <!-- 3 · MEJILLONES CACIO & PEPE -->
  <button class="ar-btn" id="ar-3"
    data-usdz="plato3.usdz"
    data-glb="plato3.glb"
    data-nombre="Mejillones Cacio & Pepe"
    aria-label="Ver Mejillones en AR">
  </button>

  <!-- 4 · GRAN LUBINA AQUANARIA -->
  <button class="ar-btn" id="ar-4"
    data-usdz="plato4.usdz"
    data-glb="plato4.glb"
    data-nombre="Gran Lubina Aquanaria"
    aria-label="Ver Gran Lubina en AR">
  </button>

</div>

<!-- ═══════════════════════════════════════════════
     OVERLAY ANDROID — model-viewer flotante
     (En iOS esto no se muestra, se usa Quick Look)
═══════════════════════════════════════════════ -->
<div id="ar-overlay">
  <button id="btn-cerrar" onclick="cerrarOverlay()">✕ &nbsp;Cerrar</button>
  <model-viewer
    id="visor"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    alt="Modelo 3D del plato">
  </model-viewer>
  <span id="nombre-plato"></span>
</div>

<!-- ═══════════════════════════════════════════════
     LÓGICA AR
═══════════════════════════════════════════════ -->
<script>
  // ── Detección de dispositivo ──────────────────────────────────────────
  const esIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

  // ── Asignar evento a cada botón ──────────────────────────────────────
  document.querySelectorAll('.ar-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const usdz   = btn.dataset.usdz;
      const glb    = btn.dataset.glb;
      const nombre = btn.dataset.nombre;

      if (esIOS) {
        abrirQuickLook(usdz);
      } else {
        abrirModelViewer(glb, usdz, nombre);
      }
    });
  });

  // ── iOS: Quick Look nativo ────────────────────────────────────────────
  // El usuario ve el plato en AR, pulsa X y vuelve al menú sin perder nada.
  function abrirQuickLook(urlUsdz) {
    const a = document.createElement('a');
    a.setAttribute('rel', 'ar');
    a.setAttribute('href', urlUsdz);

    // Quick Look exige una imagen hija para activarse
    const img = document.createElement('img');
    img.src = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
    img.style.display = 'none';
    a.appendChild(img);

    document.body.appendChild(a);
    a.click();
    setTimeout(() => document.body.removeChild(a), 300);
  }

  // ── Android / escritorio: model-viewer flotante ───────────────────────
  function abrirModelViewer(urlGlb, urlUsdz, nombre) {
    const visor = document.getElementById('visor');
    visor.setAttribute('src', urlGlb);
    visor.setAttribute('ios-src', urlUsdz);
    document.getElementById('nombre-plato').textContent = nombre;
    document.getElementById('ar-overlay').classList.add('visible');
  }

  function cerrarOverlay() {
    document.getElementById('ar-overlay').classList.remove('visible');
    // Liberar memoria al cerrar
    document.getElementById('visor').removeAttribute('src');
  }
</script>

</body>
</html>
