<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Vecchio AR</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background: #FAF9F6; display: flex; justify-content: center; }
        .contenedor { position: relative; width: 100%; max-width: 1080px; }
        img { width: 100%; height: auto; display: block; }
        svg { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 999; 
            pointer-events: none; 
        }
        .boton-ar { 
            fill: rgba(0, 0, 0, 0); 
            pointer-events: auto; 
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>

<div class="contenedor">
    <img src="menu_completo_ar.jpg">
    <svg viewBox="0 0 1080 2890" preserveAspectRatio="xMinYMin meet">
        <circle class="boton-ar" cx="466" cy="196" r="22" onclick="lanzarAR('plato1')" />
        
        <circle class="boton-ar" cx="466" cy="227" r="22" onclick="lanzarAR('plato2')" />
        
        <circle class="boton-ar" cx="466" cy="253" r="22" onclick="lanzarAR('plato3')" />

        <circle class="boton-ar" cx="466" cy="728" r="22" onclick="lanzarAR('plato4')" />
    </svg>
</div>

<model-viewer id="visor" ar ar-modes="quick-look scene-viewer"></model-viewer>

<script>
    function lanzarAR(m) {
        const v = document.getElementById('visor');
        v.src = m + '.glb';
        v.iosSrc = m + '.usdz';
        setTimeout(() => { v.activateAR(); }, 100);
    }
</script>

</body>
</html>
