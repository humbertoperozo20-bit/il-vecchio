<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Il Vecchio AR - Test</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; background: #FAF9F6; overflow-x: hidden; }
        .menu-container { position: relative; width: 100%; max-width: 1080px; margin: 0 auto; }
        .menu-img { width: 100%; height: auto; display: block; }
        svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; }
        
        /* COLOR TEMPORAL PARA PRUEBAS: Rojo transparente para ver los botones */
        .area-ar { fill: rgba(255, 0, 0, 0.3); cursor: pointer; pointer-events: auto; -webkit-tap-highlight-color: rgba(255,0,0,0.5); }
        
        model-viewer { display: none; }
    </style>
</head>
<body>

<div class="menu-container">
    <img src="menu_completo_ar.jpg" id="imgMenu" class="menu-img">
    
    <svg viewBox="0 0 1080 2890" preserveAspectRatio="xMinYMin meet">
        <circle class="area-ar" cx="465" cy="115" r="50" onclick="lanzarAR('plato1')" />
        <circle class="area-ar" cx="465" cy="135" r="50" onclick="lanzarAR('plato2')" />
        <circle class="area-ar" cx="465" cy="158" r="50" onclick="lanzarAR('plato3')" />
        <circle class="area-ar" cx="240" cy="545" r="60" onclick="lanzarAR('plato4')" />
    </svg>
</div>

<model-viewer id="visor" ar ar-modes="quick-look scene-viewer"></model-viewer>

<script>
    function lanzarAR(modelo) {
        const v = document.getElementById('visor');
        v.src = modelo + '.glb';
        v.iosSrc = modelo + '.usdz';
        setTimeout(() => { v.activateAR(); }, 100);
    }
</script>
</body>
</html>
